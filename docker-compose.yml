services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bindle-app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bindle
      DB_USER: bindle
      DB_PASSWORD: bindle
      APP_ENV: development
      APP_DOMAIN: ${APP_DOMAIN:-bindle.ir}
      APP_KEY: base64:W6hY5q3vq6pL9xR8sT7uV4wZ2yB0nMmKjHfDcXgNaPb=
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bindle
    restart: always

  web:
    image: nginx:alpine
    container_name: bindle-web
    ports:
      - "8880:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bindle
    restart: always

  db:
    image: postgres:16-alpine
    container_name: bindle-db
    environment:
      POSTGRES_DB: bindle
      POSTGRES_USER: bindle
      POSTGRES_PASSWORD: bindle
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bindle"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bindle

  migrate:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bindle-migrate
    depends_on:
      - db
    command: ["php", "migrations/migrate.php"]
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-bindle.ir}
    networks:
      - bindle

  seed:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bindle-seed
    depends_on:
      - db
    command: ["php", "migrations/seed.php"]
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - bindle

volumes:
  pgdata:

networks:
  bindle:
    driver: bridge
